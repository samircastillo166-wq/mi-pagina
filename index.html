<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferreteria el pajarito| Cotizador</title>
    <style>
        :root {
            --primary: #1e293b; 
            --accent: #f97316;  
            --bg: #f1f5f9;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--primary); }

        header {
            background: var(--primary);
            color: white;
            padding: 20px 5%;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Grid de productos */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--white);
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .img-container { width: 100%; height: 200px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .content { padding: 15px; flex-grow: 1; }
        .name { font-size: 1rem; font-weight: 700; margin-bottom: 10px; min-height: 40px; }
        .price { font-size: 1.3rem; font-weight: 800; color: #000; }

        .buy-btn {
            display: block;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .buy-btn:hover { background: var(--accent); }

        /* ESTILOS DEL MODAL (VENTANA EMERGENTE) */
        #modalCotizar {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center;
        }

        .modal-content {
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            width: 90%; 
            max-width: 400px; 
            position: relative;
        }

        .cerrar {
            position: absolute; top: 10px; right: 15px; 
            cursor: pointer; font-size: 24px; font-weight: bold; color: #666;
        }

        form input, form textarea {
            width: 100%; padding: 10px; margin-top: 10px;
            border: 1px solid #ccc; border-radius: 4px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>

        </form>
    </div>

                const nombre = document.querySelector('input[placeholder="Tu Nombre"]').value;

                const detalles = document.querySelector('textarea').value;

                const mensaje = `Hola, me gustaría cotizar el producto: ${producto}. Mi nombre es ${nombre} y mi número de teléfono es ${telefono}. Detalles adicionales: ${detalles}`;
                const urlWhatsApp = `https://wa.me/50585661823?text=${encodeURIComponent(mensaje)}`;
                
                window.open(urlWhatsApp, '_blank');
            }
